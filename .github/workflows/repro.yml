name: "Reproduce"

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --no-save

      - name: Run reproduction
        run: bun run repro
