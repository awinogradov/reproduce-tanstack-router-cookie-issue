name: "Reproduce (Node.js)"

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"

      - run: npm install --no-audit --no-fund

      - name: Run reproduction
        run: npm run repro
